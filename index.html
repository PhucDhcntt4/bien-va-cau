<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Biển Và Cậu 🌊</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        background: linear-gradient(to bottom right, #dbeafe, #eff6ff);
        overflow-x: hidden;
        min-height: 100vh;
      }

      .glass {
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(12px);
      }

      .fade-in {
        animation: fade 1.2s ease;
      }

      @keyframes fade {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .float {
        animation: float 4s ease-in-out infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-12px);
        }
        100% {
          transform: translateY(0px);
        }
      }

      .typing {
        overflow: hidden;
        white-space: nowrap;
        border-right: 3px solid #0284c7;
        width: 0;
        animation:
          typing 4s steps(40, end) forwards,
          blink 0.8s infinite;
      }

      @keyframes typing {
        from {
          width: 0;
        }
        to {
          width: 100%;
        }
      }

      @keyframes blink {
        50% {
          border-color: transparent;
        }
      }

      .heart {
        position: absolute;
        color: #7dd3fc;
        animation: fly 10s linear infinite;
        opacity: 0.6;
      }

      @keyframes fly {
        0% {
          transform: translateY(100vh) scale(0.5);
        }

        100% {
          transform: translateY(-120px) scale(1.5);
        }
      }

      .scroll-custom::-webkit-scrollbar {
        width: 6px;
      }

      .scroll-custom::-webkit-scrollbar-thumb {
        background: #7dd3fc;
        border-radius: 20px;
      }
    </style>
  </head>

  <body class="p-6 relative">
    <!-- FLOATING ICON -->
    <div class="heart left-[10%] text-3xl">🩵</div>
    <div class="heart left-[30%] text-2xl" style="animation-delay: 2s">💙</div>
    <div class="heart left-[60%] text-4xl" style="animation-delay: 4s">🩵</div>
    <div class="heart left-[80%] text-3xl" style="animation-delay: 1s">💙</div>

    <div class="max-w-7xl mx-auto">
      <!-- INTRO -->
      <div
        id="introScreen"
        class="min-h-screen flex items-center justify-center fade-in"
      >
        <div
          class="glass rounded-[40px] shadow-2xl p-10 w-full max-w-2xl text-center"
        >
          <div class="text-7xl mb-6 float">🌊</div>

          <h1 class="text-5xl font-bold text-sky-700 mb-5">Biển Và Cậu</h1>

          <div class="overflow-hidden mx-auto max-w-xl">
            <p class="typing text-slate-600 text-lg mx-auto">
              Chào cậu 💙 mình muốn lưu lại những điều nhỏ bé của cậu mỗi
              ngày...
            </p>
          </div>

          <div class="mt-10 text-left space-y-5">
            <!-- NAME -->
            <div>
              <label class="font-semibold text-slate-700">
                🌸 Tên của cậu là gì?
              </label>

              <input
                id="introName"
                type="text"
                placeholder=""
                class="w-full mt-2 p-4 rounded-2xl border border-sky-200 focus:outline-none focus:ring-2 focus:ring-sky-300"
              />
            </div>

            <!-- PHONE -->
            <div>
              <label class="font-semibold text-slate-700">
                📱 Số điện thoại
              </label>

              <input
                id="introPhone"
                type="text"
                placeholder="0123xxxxxx"
                class="w-full mt-2 p-4 rounded-2xl border border-sky-200 focus:outline-none focus:ring-2 focus:ring-sky-300"
              />
            </div>

            <!-- BIRTHDAY -->
            <div>
              <label class="font-semibold text-slate-700"> 🎂 Ngày sinh </label>

              <input
                id="introBirthday"
                type="date"
                class="w-full mt-2 p-4 rounded-2xl border border-sky-200 focus:outline-none focus:ring-2 focus:ring-sky-300"
              />
            </div>

            <!-- FAVORITE -->
            <div>
              <label class="font-semibold text-slate-700">
                💌 Điều cậu thích nhất?
              </label>

              <textarea
                id="introLike"
                rows="3"
                placeholder="Biển, nhạc chill, mèo..."
                class="w-full mt-2 p-4 rounded-2xl border border-sky-200 focus:outline-none focus:ring-2 focus:ring-sky-300"
              ></textarea>
            </div>
          </div>

          <button
            onclick="startJourney()"
            class="mt-8 w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-2xl text-lg transition shadow-lg"
          >
            💙 Bắt đầu lưu lại kỷ niệm
          </button>
        </div>
      </div>

      <!-- MAIN APP -->
      <div id="mainApp" class="hidden fade-in">
        <!-- HEADER -->
        <div class="text-center mb-10 mt-6">
          <h1 class="text-5xl font-bold text-sky-700 mb-3">🌊 Biển Và Cậu</h1>

          <p id="welcomeText" class="text-slate-600 text-lg"></p>

          <!-- LOGOUT -->
          <button
            onclick="logout()"
            class="mt-5 bg-white hover:bg-sky-100 text-sky-700 px-5 py-3 rounded-2xl shadow transition"
          >
            🔄 Đổi người dùng
          </button>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
          <!-- FORM -->
          <div class="lg:col-span-2 glass rounded-3xl p-8 shadow-xl">
            <h2 class="text-2xl font-bold text-sky-700 mb-6">
              ✨ Hôm nay của cậu thế nào?
            </h2>

            <!-- MOOD -->
            <div class="mb-5">
              <label class="font-semibold text-slate-700">
                😊 Mood hôm nay
              </label>

              <select
                id="mood"
                class="w-full mt-2 p-4 rounded-2xl border border-sky-200"
              >
                <option>😍 Rất vui</option>
                <option>😊 Bình thường</option>
                <option>😴 Hơi mệt</option>
                <option>😭 Buồn một chút</option>
                <option>😡 Khó chịu</option>
              </select>
            </div>

            <!-- FOOD -->
            <div class="mb-5">
              <label class="font-semibold text-slate-700">
                🍜 Hôm nay ăn gì?
              </label>

              <textarea
                id="food"
                rows="2"
                placeholder="Trà sữa, sushi..."
                class="w-full mt-2 p-4 rounded-2xl border border-sky-200"
              ></textarea>
            </div>

            <!-- MUSIC -->
            <div class="mb-5">
              <label class="font-semibold text-slate-700">
                🎵 Nhạc đang nghe
              </label>

              <textarea
                id="music"
                rows="2"
                placeholder="Lofi, chill..."
                class="w-full mt-2 p-4 rounded-2xl border border-sky-200"
              ></textarea>
            </div>

            <!-- DIARY -->
            <div class="mb-6">
              <label class="font-semibold text-slate-700">
                ✍️ Viết vài điều hôm nay
              </label>

              <textarea
                id="diary"
                rows="7"
                placeholder="Hôm nay mình đã..."
                class="w-full mt-2 p-4 rounded-2xl border border-sky-200"
              ></textarea>
            </div>

            <!-- BUTTON -->
            <button
              onclick="saveLog()"
              class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-2xl text-lg transition shadow-lg"
            >
              💾 Lưu hôm nay
            </button>
          </div>

          <!-- LOGS -->
          <div
            class="glass rounded-3xl p-6 shadow-xl h-[850px] overflow-y-auto scroll-custom"
          >
            <h2 class="text-2xl font-bold text-sky-700 mb-5">
              📖 Những ngày đã lưu
            </h2>

            <div id="logContainer"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // AUTO LOGIN
      window.onload = function () {
        const profile = JSON.parse(localStorage.getItem("loveProfile"));

        if (profile) {
          document.getElementById("introScreen").classList.add("hidden");

          document.getElementById("mainApp").classList.remove("hidden");

          document.getElementById("welcomeText").innerHTML =
            `Xin chào <b>${profile.name}</b> 💙<br>
        Chào mừng cậu quay lại ✨`;
        }

        renderLogs();
      };

      // START
      function startJourney() {
        const name = document.getElementById("introName").value;

        const phone = document.getElementById("introPhone").value;

        const birthday = document.getElementById("introBirthday").value;

        const like = document.getElementById("introLike").value;

        const profile = {
          name,
          phone,
          birthday,
          like,
        };

        localStorage.setItem("loveProfile", JSON.stringify(profile));

        document.getElementById("introScreen").classList.add("hidden");

        document.getElementById("mainApp").classList.remove("hidden");

        document.getElementById("welcomeText").innerHTML =
          `Xin chào <b>${name}</b> 💙<br>
      Mình sẽ lưu lại những ngày đáng nhớ của cậu ✨`;
      }

      // SAVE LOG
      function saveLog() {
        const mood = document.getElementById("mood").value;

        const food = document.getElementById("food").value;

        const music = document.getElementById("music").value;

        const diary = document.getElementById("diary").value;

        const profile = JSON.parse(localStorage.getItem("loveProfile"));

        const log = {
          mood,
          food,
          music,
          diary,
          date: new Date().toLocaleString("vi-VN"),
          name: profile.name,
        };

        let logs = JSON.parse(localStorage.getItem("loveLogs")) || [];

        logs.unshift(log);

        localStorage.setItem("loveLogs", JSON.stringify(logs));

        renderLogs();

        document.getElementById("food").value = "";
        document.getElementById("music").value = "";
        document.getElementById("diary").value = "";
      }

      // DELETE LOG
      function deleteLog(index) {
        let logs = JSON.parse(localStorage.getItem("loveLogs")) || [];

        const confirmDelete = confirm(
          "Bạn có chắc muốn xóa nhật ký này không? 🥺",
        );

        if (confirmDelete) {
          logs.splice(index, 1);

          localStorage.setItem("loveLogs", JSON.stringify(logs));

          renderLogs();
        }
      }

      // EDIT LOG
      function editLog(index) {
        let logs = JSON.parse(localStorage.getItem("loveLogs")) || [];

        const log = logs[index];

        const newMood = prompt("Chỉnh sửa mood 😊", log.mood);

        const newFood = prompt("Chỉnh sửa món ăn 🍜", log.food);

        const newMusic = prompt("Chỉnh sửa nhạc 🎵", log.music);

        const newDiary = prompt("Chỉnh sửa nhật ký ✍️", log.diary);

        logs[index] = {
          ...log,
          mood: newMood,
          food: newFood,
          music: newMusic,
          diary: newDiary,
        };

        localStorage.setItem("loveLogs", JSON.stringify(logs));

        renderLogs();
      }

      // RENDER LOGS
      function renderLogs() {
        const logs = JSON.parse(localStorage.getItem("loveLogs")) || [];

        const container = document.getElementById("logContainer");

        container.innerHTML = "";

        logs.forEach((log, index) => {
          container.innerHTML += `
        
        <div class="bg-white rounded-3xl p-5 mb-5 border border-sky-100 shadow fade-in">

          <div class="flex justify-between items-center mb-3">

            <h3 class="font-bold text-sky-700">
              ${log.name}
            </h3>

            <span class="text-xs text-slate-400">
              ${log.date}
            </span>

          </div>

          <p class="mb-2">
            <strong>😊 Mood:</strong>
            ${log.mood}
          </p>

          <p class="mb-2">
            <strong>🍜 Ăn:</strong>
            ${log.food}
          </p>

          <p class="mb-2">
            <strong>🎵 Nhạc:</strong>
            ${log.music}
          </p>

          <div class="bg-sky-50 rounded-2xl p-4 mt-4 text-slate-700">
            ${log.diary}
          </div>

          <div class="flex gap-3 mt-4">

            <button
              onclick="editLog(${index})"
              class="flex-1 bg-yellow-400 hover:bg-yellow-500 text-white py-2 rounded-xl transition"
            >
              ✏️ Chỉnh sửa
            </button>

            <button
              onclick="deleteLog(${index})"
              class="flex-1 bg-red-400 hover:bg-red-500 text-white py-2 rounded-xl transition"
            >
              🗑️ Xóa
            </button>

          </div>

        </div>

        `;
        });
      }

      // LOGOUT
      function logout() {
        localStorage.removeItem("loveProfile");

        location.reload();
      }
    </script>
  </body>
</html>
